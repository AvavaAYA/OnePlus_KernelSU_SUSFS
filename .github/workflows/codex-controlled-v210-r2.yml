name: Codex controlled v2.1.0-r2 build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-controlled-v210-r2.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: codex-controlled-v210-r2
  cancel-in-progress: true

jobs:
  build:
    name: controlled OP-ACE-6T v2.1.0-r2
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /home/runner/.ccache
      CCACHE_MAXSIZE: 10G
      CCACHE_COMPRESS: 'true'
      CCACHE_COMPRESSLEVEL: '3'
      CCACHE_BASEDIR: ${{ github.workspace }}
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600
    steps:
      - name: Checkout controlled branch
        uses: actions/checkout@v6
        with:
          ref: ci-v210-r2
          fetch-depth: 1

      - name: Disk cleanup
        shell: bash
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          sudo docker builder prune --all --force || true
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            ca-certificates \
            ccache \
            curl \
            flex \
            git \
            jq \
            libdw-dev \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            nodejs \
            python3 \
            python3-pip \
            rsync \
            unzip \
            wget \
            zip \
            zstd
          test -f /usr/include/dwarf.h
          ccache --version

      - name: Patch controlled action compat shims
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = '.github/actions/action.yml';
          let text = fs.readFileSync(path, 'utf8');
          const needle = '        esac\n        \n        cd "$COMMON_KERNEL_FOLDER"\n';
          const shim = String.raw`        esac
        
        if [ -d "$KSUN_FOLDER/kernel" ]; then
          echo "Applying KSUN/SUSFS compile compatibility shim"
          KSUN_KERNEL="$KSUN_FOLDER/kernel"
          if grep -q 'ksu_sucompat_init();' "$KSUN_KERNEL/core/init.c"; then
            if ! grep -q 'void ksu_sucompat_init(void);' "$KSUN_KERNEL/core/init.c"; then
              perl -0pi -e 's/(#include "hook\/syscall_hook.h"\n)/$1\nvoid ksu_sucompat_init(void);\nvoid ksu_setuid_hook_init(void);\n/' "$KSUN_KERNEL/core/init.c"
            fi
          fi
          if grep -q 'is_zygote_normal_app_uid' "$KSUN_KERNEL/hook/setuid_hook.c"; then
            if ! grep -q 'static inline bool is_zygote_normal_app_uid' "$KSUN_KERNEL/hook/setuid_hook.c"; then
              perl -0pi -e 's/(extern struct cred \*ksu_cred;\n)/$1\nstatic inline bool is_zygote_normal_app_uid(uid_t uid)\n{\n    return ((uid >= 10000 && uid < 19999) || (uid >= 1010000 && uid < 1019999));\n}\n/' "$KSUN_KERNEL/hook/setuid_hook.c"
            fi
          fi
        fi
        
        cd "$COMMON_KERNEL_FOLDER"
`;
          if (!text.includes('Applying KSUN/SUSFS compile compatibility shim')) {
            if (!text.includes(needle)) {
              throw new Error('SUSFS action insertion point not found');
            }
            text = text.replace(needle, shim);
            fs.writeFileSync(path, text);
          }
          NODE
          grep -n "Applying KSUN/SUSFS compile compatibility shim" .github/actions/action.yml

      - name: Build controlled kernel
        id: build
        uses: ./.github/actions
        with:
          op_config_json: |
            {
              "model": "OP-ACE-6T",
              "soc": "canoe",
              "branch": "wild/sm8845",
              "manifest": "oneplus_ace_6t_w.xml",
              "android_version": "android16",
              "kernel_version": "6.12",
              "os_version": "OOS16",
              "lto": "none",
              "zyc_compiler": "",
              "c_compiler": "kernel_platform/prebuilts/clang/host/linux-x86/clang-r547379/bin",
              "rust_compiler": "kernel_platform/prebuilts/rust/linux-x86/1.82.0/bin",
              "bindgen": "",
              "rust_build": true,
              "disk_cleanup": true,
              "hmbird": false,
              "susfs": true,
              "ds": false,
              "bbg": true,
              "bbr": true,
              "ttl": true,
              "ip_set": true,
              "unicode": true,
              "ntsync": true,
              "uname": "OP-WILD"
            }
          ksu_type: KSUN
          ksu_branch_or_hash: 551ad80473f60e052917aec08abf5323b6ab2f7c
          susfs_commit_hash_or_branch: 2e05aebdb623e87d877b7d3abdb0957f127b6ba8
          build_timestamp: Thu Apr 16 14:49:32 UTC 2026
          optimize_level: O2
          clean: 'true'

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: codex-v210-r2-failure-${{ github.run_id }}
          path: |
            OP-ACE-6T/kernel_platform/common/build.log
            OP-ACE-6T/kernel_platform/common/out/.config
            OP-ACE-6T/kernel_platform/common/out/include/config/auto.conf
            OP-ACE-6T/kernel_platform/common/out/include/generated/compile.h
            OP-ACE-6T/kernel_platform/common/out/Module.symvers
            OP-ACE-6T/kernel_platform/common/out/.tmp_versions
          if-no-files-found: warn
          retention-days: 7
          compression-level: 9

      - name: Print outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "kernel_version=${{ steps.build.outputs.kernel_version }}"
          echo "zip_name=${{ steps.build.outputs.zip_name }}"
